<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanmac 数据看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; color: #333; }

/* Layout */
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 30px; display: flex; align-items: center; gap: 20px; }
.header h1 { font-size: 22px; font-weight: 600; }
.header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 15px; }
.header .date-badge { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 13px; }

.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* Tabs */
.tabs { display: flex; gap: 2px; background: #e8e9f0; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
.tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; transition: all 0.2s; }
.tab:hover { background: rgba(255,255,255,0.6); color: #333; }
.tab.active { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.08); font-weight: 600; }
.tab .tab-icon { margin-right: 6px; }

/* Overview Cards */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.card .label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
.card .sub { font-size: 12px; color: #999; margin-top: 4px; }
.card .value.green { color: #00b894; }
.card .value.purple { color: #667eea; }
.card .value.orange { color: #fdcb6e; }

/* Content Breakdown */
.breakdown-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.breakdown-section h3 { font-size: 15px; color: #1a1a2e; margin-bottom: 16px; }
.breakdown-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f5; }
.breakdown-row:last-child { border-bottom: none; }
.breakdown-row .label { width: 120px; font-size: 13px; color: #666; display: flex; align-items: center; gap: 8px; }
.breakdown-row .bar-wrap { flex: 1; height: 8px; background: #f0f0f5; border-radius: 4px; margin: 0 16px; overflow: hidden; }
.breakdown-row .bar { height: 100%; border-radius: 4px; transition: width 0.5s; }
.breakdown-row .value { width: 120px; text-align: right; font-size: 14px; font-weight: 600; color: #1a1a2e; }

/* Table */
.table-wrap { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); overflow: hidden; }
.table-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f5; }
.table-header h3 { font-size: 15px; color: #1a1a2e; }
.table-header .count { font-size: 12px; color: #999; }
.table-controls { display: flex; gap: 8px; }
.table-controls select, .table-controls input { padding: 6px 10px; border: 1px solid #e0e0e8; border-radius: 6px; font-size: 12px; color: #555; background: white; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 12px 16px; text-align: left; font-size: 12px; color: #999; font-weight: 500; border-bottom: 1px solid #f0f0f5; cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { color: #667eea; }
thead th .sort-icon { margin-left: 4px; opacity: 0.3; }
thead th.sorted .sort-icon { opacity: 1; color: #667eea; }
tbody td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f8f8fc; }
tbody tr:hover { background: #f8f9ff; }
.rank-num { display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; border-radius: 6px; font-weight: 600; font-size: 12px; }
.rank-1 { background: #ffeaa7; color: #d68910; }
.rank-2 { background: #dfe6e9; color: #636e72; }
.rank-3 { background: #fab1a0; color: #c0392b; }
.rank-other { background: #f0f0f5; color: #999; }
.gmv-cell { font-weight: 600; color: #1a1a2e; }
.positive { color: #00b894; }
.negative { color: #d63031; }

/* Placeholder */
.placeholder { text-align: center; padding: 60px; color: #999; }
.placeholder .big-icon { font-size: 48px; margin-bottom: 16px; }
.placeholder p { font-size: 14px; }

/* Daily trend mini chart */
.trend-bar { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
.trend-bar .col { width: 6px; border-radius: 2px 2px 0 0; min-height: 2px; background: #667eea; transition: height 0.3s; }

/* Grid sub-section */
.sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

@media (max-width: 768px) {
    .sub-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 18px; }
    .overview-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>📊 Hanmac 数据看板</h1>
        <div class="subtitle">Hanmac.my · TikTok Shop Malaysia · 纸尿裤/卫生巾</div>
    </div>
    <div class="header-right">
        <span class="date-badge" id="dateBadge">加载中...</span>
    </div>
</div>

<div class="container">
    <!-- Tabs -->
    <div class="tabs" id="tabs">
        <div class="tab active" data-tab="overview">📈 行业总览</div>
        <div class="tab" data-tab="products">📦 商品榜</div>
        <div class="tab" data-tab="shops">🏪 店铺榜</div>
        <div class="tab" data-tab="creators">👤 达人榜</div>
        <div class="tab" data-tab="videos">🎬 视频榜</div>
    </div>

    <!-- Content Area -->
    <div id="content"></div>
</div>

<script>
// ─── STATE ──────────────────────────────────────
const state = {
    activeTab: 'overview',
    products: [],
    shops: [],
    overview: null,
    productSort: 'gmv',
    shopSort: 'pay_amt',
    productOrder: 'desc',
    shopOrder: 'desc',
};

// ─── API CALLS ──────────────────────────────────
async function api(path) {
    const res = await fetch(path);
    const data = await res.json();
    return data;
}

// ─── RENDER ─────────────────────────────────────
function fmt(n) {
    if (n === null || n === undefined) return '-';
    if (typeof n === 'string') n = parseFloat(n);
    if (isNaN(n)) return '-';
    if (Math.abs(n) >= 10000) {
        return 'RM ' + (n / 1000).toFixed(1) + 'K';
    }
    return 'RM ' + n.toFixed(2);
}

function fmtNum(n) {
    if (n === null || n === undefined) return '-';
    if (typeof n === 'string') n = parseInt(n);
    if (isNaN(n)) return '-';
    if (n >= 10000) return (n / 1000).toFixed(1) + 'K';
    return n.toLocaleString();
}

function rankClass(r) {
    if (r <= 3) return 'rank-' + r;
    return 'rank-other';
}

function trendChart(values, maxVal) {
    if (!values || values.length === 0) return '<span style="color:#ccc">-</span>';
    const max = maxVal || Math.max(...values) || 1;
    return '<div class="trend-bar">' + values.map(v => {
        const h = Math.max(2, (v / max) * 26);
        return `<div class="col" style="height:${h}px"></div>`;
    }).join('') + '</div>';
}

// ─── TAB RENDERERS ──────────────────────────────

function renderOverview() {
    const data = state.overview;
    if (!data) return '<div class="placeholder"><div class="big-icon">📊</div><p>加载中...</p></div>';
    
    const cb = data.content_breakdown || {};
    const dm = data.daily_metrics || {};
    const live = cb.live || {};
    const video = cb.video || {};
    const pc = cb.product_card || {};
    const totalGmv = live.gmv + video.gmv + pc.gmv;
    
    const pct = (v) => totalGmv > 0 ? ((v / totalGmv) * 100).toFixed(1) : 0;
    
    return `
        <div class="overview-grid">
            <div class="card">
                <div class="label">今日 GMV</div>
                <div class="value purple">${fmt(data.gmv_today)}</div>
                <div class="sub">${data.date || ''}</div>
            </div>
            <div class="card">
                <div class="label">今日订单</div>
                <div class="value">${fmtNum(data.orders_today)}</div>
                <div class="sub">${fmtNum(data.customers_today)} 位客户</div>
            </div>
            <div class="card">
                <div class="label">7天 GMV</div>
                <div class="value green">${fmt(data.gmv_7d)}</div>
                <div class="sub">${data.orders_7d || 0} 单 · ${data.products_count || 0} 个商品</div>
            </div>
            <div class="card">
                <div class="label">商品卡 GMV</div>
                <div class="value orange">${fmt(pc.gmv)}</div>
                <div class="sub">占比 ${pct(pc.gmv)}%</div>
            </div>
        </div>

        <div class="sub-grid">
            <div class="breakdown-section">
                <h3>📺 内容类型 GMV 拆分</h3>
                ${renderBreakdownBar('📺 直播', live.gmv || 0, totalGmv, '#667eea')}
                ${renderBreakdownBar('🎬 视频', video.gmv || 0, totalGmv, '#00b894')}
                ${renderBreakdownBar('📇 商品卡', pc.gmv || 0, totalGmv, '#fdcb6e')}
                <div style="margin-top:12px;font-size:12px;color:#999;">
                    视频: 自营 ${fmt(video.seller_gmv)} · 达人 ${fmt(video.affiliate_gmv)} |
                    商品卡: 自营 ${fmt(pc.seller_search_gmv + pc.seller_shoptab_gmv)} · 达人 ${fmt(pc.affiliate_gmv)}
                </div>
            </div>

            <div class="breakdown-section">
                <h3>📈 今日关键指标</h3>
                <div class="breakdown-row">
                    <span class="label">👥 访客</span>
                    <div class="bar-wrap"><div class="bar" style="width:80%;background:#74b9ff"></div></div>
                    <span class="value">${fmtNum(dm.visitors)}</span>
                </div>
                <div class="breakdown-row">
                    <span class="label">👀 曝光</span>
                    <div class="bar-wrap"><div class="bar" style="width:70%;background:#a29bfe"></div></div>
                    <span class="value">${fmtNum(dm.impressions)}</span>
                </div>
                <div class="breakdown-row">
                    <span class="label">📦 销量</span>
                    <div class="bar-wrap"><div class="bar" style="width:60%;background:#00b894"></div></div>
                    <span class="value">${fmtNum(dm.items_sold)}</span>
                </div>
                <div class="breakdown-row">
                    <span class="label">🛒 订单</span>
                    <div class="bar-wrap"><div class="bar" style="width:50%;background:#fdcb6e"></div></div>
                    <span class="value">${fmtNum(dm.orders)}</span>
                </div>
            </div>
        </div>
    `;
}

function renderBreakdownBar(label, value, total, color) {
    const pct = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
    return `
        <div class="breakdown-row">
            <span class="label">${label}</span>
            <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${color}"></div></div>
            <span class="value">${fmt(value)} (${pct}%)</span>
        </div>
    `;
}

function renderProducts() {
    const items = state.products;
    if (!items || items.length === 0) {
        return '<div class="placeholder"><div class="big-icon">📦</div><p>暂无商品数据，等待明早采集</p></div>';
    }
    
    const maxGmv = Math.max(...items.map(p => p.gmv_7d), 1);
    
    return `
        <div class="table-wrap">
            <div class="table-header">
                <h3>📦 商品销售榜</h3>
                <div class="table-controls">
                    <span class="count">共 ${items.length} 个商品</span>
                    <select onchange="sortProducts(this.value)">
                        <option value="gmv">按 GMV</option>
                        <option value="orders">按订单</option>
                        <option value="impressions">按曝光</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:50px">#</th>
                        <th>商品名称</th>
                        <th style="width:100px">7天 GMV</th>
                        <th style="width:80px">订单</th>
                        <th style="width:80px">曝光</th>
                        <th style="width:60px">CTR</th>
                        <th style="width:80px">加购</th>
                        <th style="width:200px">每日趋势</th>
                    </tr>
                </thead>
                <tbody>
                    ${items.map((p, i) => {
                        const daily = Object.values(p.gmv_daily || {}).slice(-7);
                        const maxD = Math.max(...daily, 1);
                        return `<tr>
                            <td><span class="rank-num ${rankClass(i+1)}">${i+1}</span></td>
                            <td>${p.name}</td>
                            <td class="gmv-cell">${fmt(p.gmv_7d)}</td>
                            <td>${fmtNum(p.orders_7d)}</td>
                            <td>${fmtNum(p.impressions_7d)}</td>
                            <td>${(p.ctr_7d * 100).toFixed(1)}%</td>
                            <td>${fmtNum(p.add_cart_7d)}</td>
                            <td>${trendChart(daily, maxD)}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;
}

function renderShops() {
    const items = state.shops;
    if (!items || items.length === 0) {
        return '<div class="placeholder"><div class="big-icon">🏪</div><p>暂无店铺排名数据</p></div>';
    }
    
    const maxPay = Math.max(...items.map(s => s.pay_amt || 0), 1);
    
    // Find our shop (Hanmac)
    const ourShop = items.find(s => s.name && s.name.includes('Hanmac'));
    
    return `
        ${ourShop ? `
        <div class="overview-grid">
            <div class="card">
                <div class="label">🏪 Hanmac.my 排名</div>
                <div class="value purple">#${ourShop.rank}</div>
                <div class="sub">${ourShop.rank_diff !== '0' ? (ourShop.rank_diff > 0 ? '↑' : '↓') + Math.abs(ourShop.rank_diff) : '持平'}</div>
            </div>
            <div class="card">
                <div class="label">总 GMV (30天)</div>
                <div class="value">${fmt(ourShop.pay_amt)}</div>
                <div class="sub">视频 ${fmt(ourShop.video_pay_amt)} · 直播 ${fmt(ourShop.live_pay_amt)} · 商品卡 ${fmt(ourShop.product_card_pay_amt)}</div>
            </div>
        </div>` : ''}

        <div class="table-wrap">
            <div class="table-header">
                <h3>🏪 母婴用品店铺榜</h3>
                <div class="table-controls">
                    <span class="count">共 ${items.length} 家店铺</span>
                    <select onchange="sortShops(this.value)">
                        <option value="pay_amt">按 GMV</option>
                        <option value="video">按视频 GMV</option>
                        <option value="live">按直播 GMV</option>
                        <option value="product_card">按商品卡 GMV</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width:50px">#</th>
                        <th>店铺名称</th>
                        <th style="width:100px">总 GMV</th>
                        <th style="width:80px">视频</th>
                        <th style="width:80px">直播</th>
                        <th style="width:80px">商品卡</th>
                        <th style="width:200px">占比</th>
                    </tr>
                </thead>
                <tbody>
                    ${items.map((s, i) => {
                        const total = s.pay_amt || 1;
                        const vPct = ((s.video_pay_amt || 0) / total * 100).toFixed(0);
                        const lPct = ((s.live_pay_amt || 0) / total * 100).toFixed(0);
                        const pPct = ((s.product_card_pay_amt || 0) / total * 100).toFixed(0);
                        const isOurs = s.name && s.name.includes('Hanmac');
                        return `<tr${isOurs ? ' style="background:#f0f0ff"' : ''}>
                            <td><span class="rank-num ${rankClass(i+1)}">${i+1}</span></td>
                            <td><strong>${s.name}</strong>${isOurs ? ' 🏠' : ''}</td>
                            <td class="gmv-cell">${fmt(s.pay_amt)}</td>
                            <td>${fmt(s.video_pay_amt)}</td>
                            <td>${fmt(s.live_pay_amt)}</td>
                            <td>${fmt(s.product_card_pay_amt)}</td>
                            <td><div class="trend-bar" style="height:16px;gap:4px">
                                <div class="col" style="width:${vPct}%;height:16px;background:#00b894" title="视频 ${vPct}%"></div>
                                <div class="col" style="width:${lPct}%;height:16px;background:#667eea" title="直播 ${lPct}%"></div>
                                <div class="col" style="width:${pPct}%;height:16px;background:#fdcb6e" title="商品卡 ${pPct}%"></div>
                            </div></td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;
}

function renderPlaceholder(icon, title, msg) {
    return `<div class="placeholder"><div class="big-icon">${icon}</div><h3 style="margin-bottom:8px">${title}</h3><p>${msg}</p></div>`;
}

// ─── TAB SWITCHING ─────────────────────────────
function switchTab(tabName) {
    state.activeTab = tabName;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
    loadTabData(tabName);
}

async function loadTabData(tab) {
    const el = document.getElementById('content');
    
    if (tab === 'overview') {
        el.innerHTML = '<div class="placeholder"><div class="big-icon">⏳</div><p>加载中...</p></div>';
        const res = await api('/api/overview');
        state.overview = res.data;
        el.innerHTML = renderOverview();
        document.getElementById('dateBadge').textContent = '📅 ' + (res.data.date || '');
    }
    else if (tab === 'products') {
        el.innerHTML = '<div class="placeholder"><div class="big-icon">⏳</div><p>加载中...</p></div>';
        const res = await api(`/api/products?sort=${state.productSort}&order=${state.productOrder}&limit=50`);
        state.products = res.data.list;
        el.innerHTML = renderProducts();
    }
    else if (tab === 'shops') {
        el.innerHTML = '<div class="placeholder"><div class="big-icon">⏳</div><p>加载中...</p></div>';
        const res = await api(`/api/shops?sort=${state.shopSort}&order=${state.shopOrder}&limit=50`);
        state.shops = res.data.list;
        el.innerHTML = renderShops();
    }
    else if (tab === 'creators') {
        el.innerHTML = renderPlaceholder('👤', '达人榜', '达人数据由每日报告产生，暂未入库。后续可对接 creators_30d 表。');
    }
    else if (tab === 'videos') {
        el.innerHTML = renderPlaceholder('🎬', '视频榜', '视频数据由每日报告产生，暂未入库。后续可对接 posts_30d 表。');
    }
}

function sortProducts(field) {
    state.productSort = field;
    state.products.sort((a, b) => {
        const va = a[field + '_7d'] || 0;
        const vb = b[field + '_7d'] || 0;
        return vb - va;
    });
    document.getElementById('content').innerHTML = renderProducts();
}

function sortShops(field) {
    state.shopSort = field;
    const key = field === 'pay_amt' ? 'pay_amt' : field + '_pay_amt';
    state.shops.sort((a, b) => (b[key] || 0) - (a[key] || 0));
    document.getElementById('content').innerHTML = renderShops();
}

// ─── INIT ───────────────────────────────────────
document.getElementById('tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (tab) switchTab(tab.dataset.tab);
});

// Initial load
loadTabData('overview');
</script>
</body>
</html>
